appId: com.vilelalab.bah
productName: Bah
afterPack: build/afterPack.js
publish:
  provider: github
  owner: alexvilelabah
  repo: bah-browser
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - package.json
# Ícone acessível em runtime (bandeja do sistema) — o exe embute o ícone, mas o Tray
# precisa de um arquivo em disco. Vai pra resources/icon.png no app empacotado.
extraResources:
  - from: build/icon.png
    to: icon.png
# Desempacota o WASM (motor de voz local) — o onnxruntime nao carrega WASM de dentro do asar.
asarUnpack:
  - "**/*.wasm"
win:
  target:
    - nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  # Sem espaços no nome → o GitHub não troca por pontos e o nome bate com o latest.yml
  # (essencial pro auto-update achar o arquivo).
  artifactName: ${productName}-Setup-${version}.${ext}
mac:
  target:
    - dmg
  icon: build/icon.png
linux:
  target:
    - AppImage
  icon: build/icon.png
